<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesion | Optica Lima </title>
  <link rel="preload" href="../assets/logo/Logo.jpg" as="image">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-brand">
      <img src="../assets/logo/Logo.jpg" alt="Logo Optica Lima" class="login-logo" loading="eager">
      <h1>OPTICA LIMA TU VISIÓN,
        ES NUESTRA PRIORIDAD
      </h1>
      <p>Gestion profesional de clientes y medidas visuales.</p>
      </p>Creado por la empresa Krd
    </section>

    <section class="login-card">
      <div>
        <span class="eyebrow">Acceso Seguro</span>
        <h2>Iniciar Sesion</h2>
      </div>
      <form data-login-form novalidate>
        <label>
          Correo
          <input name="email" type="email" placeholder="usuario@opticalima.pe" required autocomplete="email">
        </label>
        <label>
          Contraseña
          <input name="password" type="password" placeholder="Tu contrasena" required autocomplete="current-password">
        </label>
        <button class="primary-button" type="submit">Ingresar</button>
      </form>
    </section>
  </main>
  <div class="toast" data-toast></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
