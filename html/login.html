<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesion | Optica Lima</title>
  <meta name="description" content="Sistema de gestion profesional — Optica Lima">
  <link rel="preload" href="../assets/logo/Logo.jpg" as="image">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-page">

  <main class="login-shell">

    <section class="login-brand" aria-hidden="true">

      <img src="../assets/logo/Logo.jpg" alt="Logo Optica Lima" class="login-logo">

      <h1 class="brand-name">OPTICA LIMA</h1>

      <p class="brand-tagline">TU VISION,<br>ES NUESTRA PRIORIDAD</p>

      <p class="brand-desc">Gestion profesional de clientes y medidas visuales.</p>

    </section>

    <section class="login-card">

      <div class="login-card-header">
        <span class="eyebrow">Acceso al Sistema</span>
        <h2>Iniciar Sesion</h2>
      </div>

      <div class="login-blocked" data-login-blocked aria-live="assertive" role="alert">
        <strong>Demasiados intentos fallidos</strong>
        <span data-block-message>Intente nuevamente en 15:00 minutos.</span>
      </div>

      <form data-login-form novalidate>

        <label>
          Correo electronico
          <div class="input-group">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input name="email" type="email" placeholder="usuario@opticalima.pe" required autocomplete="email" inputmode="email">
          </div>
        </label>

        <label>
          Contrasena
          <div class="input-group">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </span>
            <input name="password" type="password" id="loginPassword" placeholder="Tu contrasena" required autocomplete="current-password">
            <button type="button" class="input-action" data-toggle-password aria-label="Mostrar contrasena" title="Mostrar contrasena">
              <svg data-eye-show width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg data-eye-hide width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </label>

        <div class="login-options">
          <label class="login-remember">
            <input type="checkbox" name="remember" id="loginRemember">
            Recordar sesion
          </label>
        </div>

        <button class="primary-button" type="submit" style="width:100%;justify-content:center;min-height:48px;font-size:0.95rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/>
          </svg>
          Ingresar al Sistema
        </button>

      </form>

      <p style="font-size:0.76rem;color:var(--muted);text-align:center;margin-top:-8px;">
        Creado por <strong style="color:var(--primary-dark)">KRD</strong> &nbsp;&middot;&nbsp; Optica Lima
      </p>

    </section>
  </main>

  <div class="toast" data-toast role="status" aria-live="polite"></div>

  <script src="../js/vendor/supabase.min.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/auth.js"></script>

  <script>
    (function () {
      var btn = document.querySelector("[data-toggle-password]");
      var inp = document.getElementById("loginPassword");
      var eyeShow = btn && btn.querySelector("[data-eye-show]");
      var eyeHide = btn && btn.querySelector("[data-eye-hide]");
      if (!btn || !inp) return;
      btn.addEventListener("click", function () {
        var hidden = inp.type === "password";
        inp.type = hidden ? "text" : "password";
        btn.title = hidden ? "Ocultar contrasena" : "Mostrar contrasena";
        if (eyeShow) eyeShow.style.display = hidden ? "none" : "";
        if (eyeHide) eyeHide.style.display = hidden ? "" : "none";
      });
    })();
  </script>

</body>
</html>
