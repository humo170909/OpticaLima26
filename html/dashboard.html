<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Optica Lima</title>
  <link rel="preload" href="../assets/logo/Logo.jpg" as="image">
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body data-protected="true">

  <aside class="sidebar">
    <a class="logo" href="dashboard.html" aria-label="Ir al dashboard">
      <img src="../assets/logo/Logo.jpg" alt="Logo Optica Lima" class="sidebar-logo" loading="eager">
      <span class="logo-text">OPTICA LIMA TU VISIÓN,
        ES NUESTRA PRIORIDAD </span>
    </a>
    <nav aria-label="Navegacion principal">
      <a href="dashboard.html"><span class="nav-icon">01</span>Resumen</a>
      <a href="clientes.html"><span class="nav-icon">02</span>Clientes</a>
      <a href="ventas.html"><span class="nav-icon">03</span>Ventas</a>
      <a href="gastos.html"><span class="nav-icon">04</span>Gastos</a>
      <a href="auditoria.html"><span class="nav-icon">05</span>Auditoria</a>
    </nav>
    <button class="logout-button" data-logout type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 17l1.4-1.4L8.8 13H20v-2H8.8l2.6-2.6L10 7l-5 5 5 5z"/><path d="M4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
      Cerrar sesion
    </button>
  </aside>

  <main class="app-main">
    <header class="topbar">
      <div>
        <span class="eyebrow">Resumen de Ventas</span>
        <h1>Gestion Empresarial</h1>
      </div>
      <span class="user-pill" data-user-email></span>
    </header>

    <section class="metrics-grid" data-dashboard-cards>
      <article class="metric skeleton"><span></span><strong></strong></article>
      <article class="metric skeleton"><span></span><strong></strong></article>
      <article class="metric skeleton"><span></span><strong></strong></article>
      <article class="metric skeleton"><span></span><strong></strong></article>
      <article class="metric skeleton"><span></span><strong></strong></article>
      <article class="metric skeleton"><span></span><strong></strong></article>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <span class="eyebrow">Estadisticas</span>
          <h2>Ventas y balance</h2>
        </div>
      </div>
      <div class="stats-strip" data-dashboard-stats>
        <div class="stat-line skeleton"></div>
        <div class="stat-line skeleton"></div>
        <div class="stat-line skeleton"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <span class="eyebrow">Actividad reciente</span>
          <h2>Ultimos clientes</h2>
        </div>
        <a href="clientes.html" class="secondary-button">Ver todos</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Cliente</th>
              <th>DNI</th>
              <th>Celular</th>
              <th>Registro</th>
              <th></th>
            </tr>
          </thead>
          <tbody data-recent-clients>
            <tr><td colspan="5" class="loading-row">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="toast" data-toast></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
