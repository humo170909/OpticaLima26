<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ventas | Optica Lima</title>
  <link rel="preload" href="../assets/logo/Logo.jpg" as="image">
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body data-protected="true" data-module="ventas">
  <aside class="sidebar">
    <a class="logo" href="dashboard.html">
      <img src="../assets/logo/Logo.jpg" alt="Logo Optica Lima" class="sidebar-logo" loading="eager">
      <span class="logo-text">OPTICA LIMA TU VISIÓN,
        ES NUESTRA PRIORIDAD</span>
    </a>
    <nav>
      <a href="dashboard.html"><span class="nav-icon">01</span>Resumen</a>
      <a href="clientes.html"><span class="nav-icon">02</span>Clientes</a>
      <a href="ventas.html"><span class="nav-icon">03</span>Ventas</a>
      <a href="gastos.html"><span class="nav-icon">04</span>Gastos</a>
      <a href="auditoria.html"><span class="nav-icon">05</span>Auditoria</a>
    </nav>
    <button class="logout-button" data-logout type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 17l1.4-1.4L8.8 13H20v-2H8.8l2.6-2.6L10 7l-5 5 5 5z"/><path d="M4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
      Cerrar sesion
    </button>
  </aside>

  <main class="app-main">
    <header class="topbar">
      <div>
        <span class="eyebrow">Ingresos diarios</span>
        <h1>Ventas</h1>
      </div>
      <button class="secondary-button" data-export-movements type="button">Descargar Excel</button>
    </header>

    <section class="split-layout">
      <form class="panel compact-form" data-movement-form novalidate>
        <div class="panel-header"><h2>Nueva venta</h2></div>
        <label>Descripcion <input name="description" required placeholder="Ej: Lentes de contacto"></label>
        <label>Monto (S/) <input name="amount" type="number" step="0.01" min="0" required placeholder="0.00"></label>
        <label>Fecha <input name="movement_date" type="date" required></label>
        <label>Metodo de pago
          <select name="payment_method" required>
            <option value="Efectivo">Efectivo</option>
            <option value="Yape">Yape</option>
            <option value="Plin">Plin</option>
            <option value="Tarjeta">Tarjeta</option>
            <option value="Transferencia">Transferencia</option>
          </select>
        </label>
        <button class="primary-button" type="submit">Registrar venta</button>
      </form>

      <section class="panel">
        <div class="panel-header">
          <div>
            <span class="eyebrow">Ultimos movimientos</span>
            <h2>Total: <span data-movement-total>S/ 0.00</span></h2>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Descripcion</th>
                <th>Metodo</th>
                <th>Monto</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody data-movement-results>
              <tr><td colspan="5" class="loading-row">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <div class="toast" data-toast></div>

  <div id="editMovementModal" class="modal-overlay">
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h2>Editar venta</h2>
        <button class="modal-close" data-modal-close type="button">&times;</button>
      </div>
      <form class="compact-form modal-form" id="editMovementForm" novalidate>
        <input type="hidden" id="editMovementId">
        <label>Descripcion <input id="editMovementDescription" required></label>
        <label>Monto (S/) <input id="editMovementAmount" type="number" step="0.01" min="0" required></label>
        <label>Fecha <input id="editMovementDate" type="date" required></label>
        <label>Metodo de pago
          <select id="editMovementPayment" required>
            <option value="Efectivo">Efectivo</option>
            <option value="Yape">Yape</option>
            <option value="Plin">Plin</option>
            <option value="Tarjeta">Tarjeta</option>
            <option value="Transferencia">Transferencia</option>
          </select>
        </label>
        <div class="form-actions">
          <button class="secondary-button" type="button" data-modal-close>Cancelar</button>
          <button class="primary-button" type="submit">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/movimientos.js"></script>
</body>
</html>
